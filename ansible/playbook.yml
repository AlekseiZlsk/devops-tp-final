---
- name: Configuration de base (Node Exporter pour les deux VMs)
  hosts: all
  become: yes
  tasks:
    - name: Mettre a jour le cache APT
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer Prometheus Node Exporter
      apt:
        name: prometheus-node-exporter
        state: present

- name: Installation de Kubernetes
  hosts: k3s
  become: yes
  tasks:
    - name: Installer K3s via le script officiel
      shell: curl -sfL https://get.k3s.io | sh -

- name: Installation de la stack Monitoring
  hosts: monitoring
  become: yes
  tasks:
    - name: Installer Prometheus
      apt:
        name: prometheus
        state: present

    - name: Installer Grafana (depuis le paquet officiel)
      apt:
        deb: https://dl.grafana.com/oss/release/grafana_10.4.0_amd64.deb

    - name: Configurer Prometheus pour cibler les deux machines
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'node_exporter'
              static_configs:
                - targets:
                  - 'localhost:9100'
                  - '{{ hostvars[groups["k3s"][0]].inventory_hostname }}:9100'
      notify: Redemarrer prometheus

    - name: Activer et demarrer les services
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - grafana-server
        - prometheus

  handlers:
    - name: Redemarrer prometheus
      service:
        name: prometheus
        state: restarted
